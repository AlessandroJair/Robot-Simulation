# Local costmap - rolling window alrededor del robot
local_costmap:
  global_frame: odom
  robot_base_frame: rocker_bogie/base_link_nav
  update_frequency: 5.0
  publish_frequency: 2.0
  transform_tolerance: 3.0
  rolling_window: true
  width: 10.0
  height: 10.0
  resolution: 0.05

  plugins:
    - {name: obstacle_layer, type: "costmap_2d::VoxelLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  obstacle_layer:
    observation_sources: velodyne_cloud
    velodyne_cloud:
      sensor_frame: rocker_bogie/velodyne_base_link
      data_type: PointCloud2
      topic: /velodyne_points
      marking: true
      clearing: true
      min_obstacle_height: 2.0
      max_obstacle_height: 3.0
      obstacle_range: 5.0
      raytrace_range: 6.0

  inflation_layer:
    inflation_radius: 0.25
    cost_scaling_factor: 10.0
